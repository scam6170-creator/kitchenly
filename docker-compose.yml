version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kitchenly-db
    environment:
      POSTGRES_USER: ${DB_USER:-kitchenly}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kitchenly123}
      POSTGRES_DB: ${DB_NAME:-kitchenly}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchenly"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kitchenly-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kitchenly-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-kitchenly}
      DB_PASSWORD: ${DB_PASSWORD:-kitchenly123}
      DB_NAME: ${DB_NAME:-kitchenly}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - kitchenly-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kitchenly-frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - kitchenly-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  kitchenly-network:
    driver: bridge
