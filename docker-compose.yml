version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: kitchenly_db
    environment:
      POSTGRES_USER: kitchenly
      POSTGRES_PASSWORD: kitchenly_password
      POSTGRES_DB: kitchenly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchenly"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kitchenly_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kitchenly:kitchenly_password@postgres:5432/kitchenly_db
      JWT_SECRET: your_jwt_secret_key_change_in_production
      JWT_EXPIRE: 7d
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kitchenly_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: kitchenly_network
